# OTA 固件服务器 - 支持 ESP32 直接上传
server {
    listen 8080;
    server_name _;
    client_max_body_size 20M;
    
    # 日志配置
    access_log /var/log/nginx/ota_access.log;
    error_log /var/log/nginx/ota_error.log;
    
    # OTA 管理页面
    location / {
        root /var/www/html;
        index ota_manager.html;
        try_files $uri $uri/ /ota_manager.html;
    }
    
    # 固件下载和上传路径 (支持 ESP32 HTTP PUT)
    location /firmware {
        alias /var/www/firmware;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # 启用 WebDAV PUT 方法允许 ESP32 直接上传
        dav_methods PUT;
        create_full_put_path on;
        dav_access user:rw group:r all:r;
        
        # MIME 类型配置
        types {
            application/octet-stream bin;
        }
        default_type application/octet-stream;
        
        # CORS 头 (允许 ESP32 跨域访问)
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, PUT, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        
        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, PUT, OPTIONS";
            add_header Access-Control-Allow-Headers "*";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
    
    # API 上传接口 (网页上传使用)
    location /api/upload {
        limit_except POST {
            deny all;
        }
        proxy_pass http://127.0.0.1:5000/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 其他 API 接口 (固件列表、设备列表、日志等)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }
}
